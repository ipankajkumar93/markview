<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Meta refresh to automatically redirect to home -->
    <meta http-equiv="refresh" content="0; url={{ config.base_url | safe }}">
    
    <!-- JavaScript fallback for faster redirect -->
    <script>
        window.location.replace("{{ config.base_url | safe }}");
    </script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div>
        <p>Redirecting you back to the home page...</p>
        <a href="{{ config.base_url | safe }}" style="color: #58a6ff; text-decoration: none;">Click here if you are not redirected automatically</a>
    </div>
</body>
</html>
