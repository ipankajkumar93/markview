<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markview</title>
    
    <!-- Standard HTML Meta -->
    <meta name="description" content="A beautiful, lightning-fast, fully client-side Markdown viewer.">
    <meta name="author" content="Pankaj Kumar">
    <link rel="canonical" href="https://markview.pankajkumar.xyz">

    <!-- Open Graph -->
    <meta property="og:site_name" content="Markview">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Markview">
    <meta property="og:description" content="A beautiful, lightning-fast, fully client-side Markdown viewer.">
    <meta property="og:url" content="https://markview.pankajkumar.xyz">
    <meta property="og:locale" content="en_US">
    <meta property="og:image" content="https://markview.pankajkumar.xyz/images/og-image.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Markview">

    <!-- Twitter / X Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Markview">
    <meta name="twitter:description" content="A beautiful, responsive and fast Markdown viewer.">
    <meta name="twitter:url" content="https://markview.pankajkumar.xyz">
    <meta name="twitter:image" content="https://markview.pankajkumar.xyz/images/og-image.png">
    <meta name="twitter:image:alt" content="Markview">
    
    
    <!-- Preload primary fonts to prevent FOUT layout shift -->
    <link rel="preload" href="https://markview.pankajkumar.xyz/fonts/geist_5.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://markview.pankajkumar.xyz/fonts/geist_10.woff2" as="font" type="font/woff2" crossorigin>
    
    <link rel="stylesheet" href="https://markview.pankajkumar.xyz/styles/fonts.css?h=3af6266dda8f5a65f31a">
    <link rel="stylesheet" href="https://markview.pankajkumar.xyz/styles/main.css?h=bc430c3a41c7ca0ff1f8">
    <link rel="stylesheet" href="https://markview.pankajkumar.xyz/css/markview.css?h=dc5613a34d49ea1c80d6">
    
    <!-- Marked.js — pinned to 12.0.0 for API stability -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <!-- DOMPurify — pinned -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <!-- KaTeX CSS for Math — pinned -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    
    <!-- PrismJS — pinned for fallback syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" id="prism-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

    <script>
        (function () {
            // Always start at the top of the page on load/reload
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }

            let stored = localStorage.getItem('theme');
            if (stored !== 'light' && stored !== 'dark') {
                stored = 'dark';
                localStorage.setItem('theme', stored);
            }
            document.documentElement.setAttribute('data-theme', stored);
            document.documentElement.style.colorScheme = stored;
        })();
    </script>
    <script src="https://markview.pankajkumar.xyz/js/feather.min.js?h=ea465ac6b69a037dc49f" defer></script>
    <script src="https://markview.pankajkumar.xyz/js/lucide.min.js?h=5ec87d19ae8868ca65bc" defer></script>
    
    <!-- Umami Analytics -->
    <script defer src="https://um.pankajkumar.xyz/script.js" data-website-id="134f7c16-1f6d-4586-bdf7-9edc428cf6c5"></script>
</head>
<body>
    <header class="markview-header">
        <div class="header-inner" style="position: relative;">
            <a href="https://markview.pankajkumar.xyz" class="title" aria-label="Go to homepage">
                <span class="name">Markview</span>
            </a>
            
            <div class="header-center hidden" id="header-upload-container">
                <input type="file" id="header-markdown-upload" accept=".md,.markdown,text/markdown" class="hidden" />
                <label for="header-markdown-upload" class="header-action-btn" title="Upload Local File">
                    <i data-feather="upload"></i>
                    <span>Upload</span>
                </label>
                <button class="header-action-btn" id="header-load-url-btn" title="Load from URL">
                    <i data-feather="link"></i>
                    <span>URL</span>
                </button>
                <button class="header-action-btn" id="export-pdf-btn" title="Export as PDF">
                    <i data-feather="download"></i>
                    <span>PDF</span>
                </button>
            </div>
            
            <nav>
                <button class="theme-toggle" title="Toggle Dark Mode" aria-label="Switch to dark mode">
                    <i data-feather="moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="markview-main">
        <div id="upload-container" class="upload-container">
            <div class="upload-box" id="upload-dropzone">
                <i data-feather="upload-cloud" class="upload-icon"></i>
                <h2>Upload Markdown File</h2>
                <p>Drag & drop, choose a file, paste a URL, or press <kbd>Ctrl V</kbd> to paste markdown directly.</p>
                <div class="upload-actions">
                    <input type="file" id="markdown-upload" accept=".md,.markdown,text/markdown" class="hidden" />
                    <label for="markdown-upload" class="upload-btn">Choose File</label>
                    <span class="or-divider">or</span>
                    <div class="url-input-group">
                        <input type="url" id="markdown-url" placeholder="e.g. https://raw.githubusercontent.com/..." />
                        <button id="load-url-btn" class="upload-btn url-btn">Load URL</button>
                    </div>
                </div>
            </div>
            <!-- Recent files history — populated by JS from localStorage -->
            <div id="mv-recent-files" class="mv-recent-files hidden"></div>
            <p class="mv-keyboard-hint">Press <kbd>?</kbd> for keyboard shortcuts</p>
        </div>

        <div id="viewer-container" class="viewer-container hidden">
            <aside id="toc-sidebar" class="toc-sidebar">
                <div class="toc-header">
                    <h3>Table of Contents</h3>
                    <button id="toggle-sidebar" class="toggle-btn" aria-label="Toggle Sidebar">
                        <i data-feather="chevron-left"></i>
                    </button>
                </div>
                <nav id="toc-nav" class="toc-nav"></nav>
            </aside>
            <button id="expand-sidebar" class="expand-btn hidden" aria-label="Expand Sidebar">
                <i data-feather="menu"></i>
            </button>
            <div class="markdown-wrapper">
                <div id="mv-doc-stats-bar" class="mv-doc-stats-bar hidden"></div>
                <div class="markdown-content" id="markdown-content"></div>
            </div>
        </div>

    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-left">
               Copyright ©  2026 All rights reserved.
            </div>
            <div class="footer-center">
                Crafted with ❤️ by Pankaj Kumar
            </div>
            <div class="footer-right">
                <div class="social-links">
                    
                    <a href="https:&#x2F;&#x2F;github.com&#x2F;ipankajkumar93&#x2F;markview" target="_blank" rel="noopener noreferrer me" title="GitHub" class="social-icon" aria-label="GitHub">
                        <i data-feather="github"></i>
                    </a>
                    
                </div>
            </div>
        </div>
    </footer>

    <button id="back-to-top" class="back-to-top" title="Back to top" aria-label="Back to top">
        <i data-feather="arrow-up"></i>
    </button>

    <script src="https://markview.pankajkumar.xyz/js/main.js?h=eae4fb8d3ac153c974c9"></script>
    <script type="module" src="https://markview.pankajkumar.xyz/js/markview.js?h=33d027d38efd745582aa"></script>
</body>
</html>
